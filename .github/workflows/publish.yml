name: Build and Publish

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render Quarto book
        run: quarto render .

      - name: Render slides
        run: quarto render slides/

      - name: Render oefeningen
        run: quarto render oefeningen/

      - name: Restore cached slide PDFs
        uses: actions/cache@v4
        with:
          path: cached-slide-pdfs
          key: slide-pdfs-${{ github.sha }}
          restore-keys: |
            slide-pdfs-

      - name: Convert changed slides to PDF
        run: |
          # Copy any cached PDFs into the build directory
          if [ -d cached-slide-pdfs ]; then
            cp cached-slide-pdfs/*.pdf build/slides/ 2>/dev/null || true
          fi

          # Check if global slide config changed → rebuild all PDFs
          REBUILD_ALL=false
          if git diff --name-only HEAD~1 HEAD 2>/dev/null | grep -qE 'slides/(_quarto\.yml|_extensions/)'; then
            REBUILD_ALL=true
          fi

          # Find which specific .qmd slide files changed
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null -- 'slides/*.qmd' | xargs -rI{} basename {} .qmd)

          # Collect slides that need PDF (re)generation
          TO_CONVERT=""
          for f in build/slides/*.html; do
            name=$(basename "$f" .html)
            [ "$name" = "index" ] && continue
            pdf="build/slides/${name}.pdf"
            if [ "$REBUILD_ALL" = "true" ] || [ ! -f "$pdf" ] || echo "$CHANGED" | grep -qw "$name"; then
              TO_CONVERT="$TO_CONVERT $name"
            fi
          done

          if [ -z "$TO_CONVERT" ]; then
            echo "All slide PDFs are up to date"
          else
            npm install -g decktape
            for name in $TO_CONVERT; do
              echo "Converting $name to PDF..."
              decktape reveal "file://$(pwd)/build/slides/${name}.html" \
                "build/slides/${name}.pdf" \
                --size 1920x1080 --chrome-arg=--no-sandbox || true
            done
          fi

          # Update cache directory
          mkdir -p cached-slide-pdfs
          cp build/slides/*.pdf cached-slide-pdfs/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
